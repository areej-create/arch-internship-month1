<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taskflow — Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:         #0F0F0F;
      --surface:    #181818;
      --surface-2:  #202020;
      --surface-3:  #2A2A2A;
      --border:     rgba(255,255,255,0.07);
      --border-md:  rgba(255,255,255,0.12);
      --border-hi:  rgba(255,255,255,0.22);
      --text:       #F0EDE8;
      --text-2:     #A09A92;
      --text-3:     #5A5550;
      --accent:     #E8D5B0;
      --accent-dim: rgba(232,213,176,0.12);
      --high:       #FF6B6B;
      --high-bg:    rgba(255,107,107,0.1);
      --med:        #F4A942;
      --med-bg:     rgba(244,169,66,0.1);
      --low:        #5CB85C;
      --low-bg:     rgba(92,184,92,0.1);
      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
      --ease:       0.2s cubic-bezier(0.4,0,0.2,1);
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Geist', -apple-system, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 0%, rgba(232,213,176,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,107,107,0.03) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* APP LAYOUT */
    .app { position: relative; z-index: 1; display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

    /* SIDEBAR */
    .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 2rem 1.25rem; display: flex; flex-direction: column; gap: 1.75rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .brand { display: flex; align-items: center; gap: 10px; padding: 0 0.25rem; }
    .brand-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #1A1208; font-weight: 700; flex-shrink: 0; }
    .brand-name { font-family: 'Instrument Serif', serif; font-size: 1.3rem; color: var(--text); }
    .sidebar-label { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); padding: 0 0.75rem; margin-bottom: 3px; }
    .sidebar-section { display: flex; flex-direction: column; gap: 2px; }
    .fi {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.5rem 0.75rem; border-radius: var(--radius-sm);
      border: none; background: transparent; color: var(--text-2);
      font-family: 'Geist', sans-serif; font-size: 0.88rem;
      cursor: pointer; transition: all var(--ease); text-align: left; width: 100%;
    }
    .fi:hover { background: var(--surface-2); color: var(--text); }
    .fi.active { background: var(--accent-dim); color: var(--accent); }
    .fi-left { display: flex; align-items: center; gap: 8px; }
    .fi-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; opacity: 0.7; }
    .fi-count { font-size: 0.7rem; font-weight: 500; background: var(--surface-3); color: var(--text-3); padding: 1px 7px; border-radius: 999px; min-width: 22px; text-align: center; }
    .fi.active .fi-count { background: var(--accent-dim); color: var(--accent); }
    .p-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pd-h { background: var(--high); } .pd-m { background: var(--med); } .pd-l { background: var(--low); }
    .sb-divider { height: 1px; background: var(--border); }
    .api-pill { margin-top: auto; display: flex; align-items: center; gap: 8px; padding: 0.6rem 0.75rem; border-radius: var(--radius-sm); background: var(--surface-2); font-size: 0.78rem; }
    .s-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; background: var(--text-3); transition: background 0.3s, box-shadow 0.3s; }
    .s-dot.ok  { background: var(--low);  box-shadow: 0 0 6px var(--low); }
    .s-dot.err { background: var(--high); box-shadow: 0 0 6px var(--high); }
    .s-text { color: var(--text-2); }

    /* MAIN */
    .main { display: flex; flex-direction: column; min-height: 100vh; }

    /* TOPBAR */
    .topbar { padding: 1.75rem 2.5rem 0; display: flex; align-items: flex-start; justify-content: space-between; }
    .page-title { font-family: 'Instrument Serif', serif; font-size: 2rem; color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
    .page-sub { font-size: 0.8rem; color: var(--text-3); margin-top: 3px; }
    .ring-wrap { position: relative; width: 44px; height: 44px; flex-shrink: 0; }
    .ring-svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--surface-3); stroke-width: 3; }
    .ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.7s cubic-bezier(0.4,0,0.2,1); }
    .ring-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 600; color: var(--text-2); }

    /* STATS */
    .stats { display: flex; gap: 12px; padding: 1.5rem 2.5rem; }
    .stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 1rem 1.25rem; position: relative; overflow: hidden; transition: border-color var(--ease); }
    .stat:hover { border-color: var(--border-md); }
    .stat::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--border-hi), transparent); }
    .stat-val { font-family: 'Instrument Serif', serif; font-size: 2.2rem; line-height: 1; color: var(--text); letter-spacing: -0.03em; }
    .stat-lbl { font-size: 0.7rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; font-weight: 500; }
    .stat-bar { height: 2px; background: var(--surface-3); border-radius: 1px; margin-top: 1rem; overflow: hidden; }
    .stat-fill { height: 100%; border-radius: 1px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }

    /* ADD */
    .add-wrap { padding: 0 2.5rem 1.5rem; }
    .add-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1px; transition: border-color var(--ease); }
    .add-box:focus-within { border-color: var(--border-hi); }
    .add-inner { display: flex; align-items: center; background: var(--surface); border-radius: calc(var(--radius-lg) - 1px); overflow: hidden; }
    .add-plus { padding: 0 1rem 0 1.25rem; color: var(--text-3); font-size: 1.1rem; pointer-events: none; flex-shrink: 0; }
    .add-inp { flex: 1; height: 52px; padding: 0 0.5rem; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Geist', sans-serif; font-size: 0.95rem; }
    .add-inp::placeholder { color: var(--text-3); }
    .add-sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
    .pri-wrap { display: flex; align-items: center; gap: 6px; padding: 0 1rem; flex-shrink: 0; }
    .pri-lbl { font-size: 0.7rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 500; }
    .pri-sel { height: 30px; padding: 0 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px; color: var(--text-2); font-family: 'Geist', sans-serif; font-size: 0.82rem; outline: none; cursor: pointer; }
    .pri-sel:focus { border-color: var(--border-md); }
    .btn-add { height: 52px; padding: 0 1.5rem; background: var(--accent); color: #1A1208; border: none; font-family: 'Geist', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all var(--ease); flex-shrink: 0; }
    .btn-add:hover { background: #F0DFC0; }
    .btn-add:active { transform: scale(0.98); }
    .btn-add:disabled { opacity: 0.4; cursor: not-allowed; }

    /* TASK AREA */
    .task-area { padding: 0 2.5rem 4rem; flex: 1; }
    .ta-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .ta-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-3); }
    .btn-clr { height: 28px; padding: 0 12px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--high); font-family: 'Geist', sans-serif; font-size: 0.75rem; cursor: pointer; transition: all var(--ease); }
    .btn-clr:hover { background: var(--high-bg); border-color: var(--high); }

    /* TASKS */
    .task-list { display: flex; flex-direction: column; gap: 4px; }
    .task-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; transition: border-color var(--ease), opacity 0.3s; animation: popIn 0.25s cubic-bezier(0.4,0,0.2,1); }
    @keyframes popIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
    .task-card:hover { border-color: var(--border-md); }
    .task-card.is-done { opacity: 0.42; }
    .task-card.is-done:hover { opacity: 0.6; }
    .task-card.p-high   { border-left: 2px solid var(--high); }
    .task-card.p-medium { border-left: 2px solid var(--med); }
    .task-card.p-low    { border-left: 2px solid var(--low); }

    .task-row { display: flex; align-items: center; gap: 12px; padding: 13px 14px 13px 16px; }
    .chk { width: 18px; height: 18px; border: 1.5px solid var(--border-md); border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all var(--ease); }
    .chk:hover { border-color: var(--accent); }
    .chk.on { background: var(--accent); border-color: var(--accent); }
    .chk.on::after { content: ''; width: 4px; height: 8px; border-right: 1.5px solid #1A1208; border-bottom: 1.5px solid #1A1208; transform: rotate(40deg) translateY(-1px); display: block; }
    .task-body { flex: 1; min-width: 0; }
    .task-txt { font-size: 0.92rem; color: var(--text); word-break: break-word; transition: color var(--ease); }
    .task-txt.done { text-decoration: line-through; color: var(--text-3); }
    .task-meta { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .pbadge { font-size: 0.64rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; }
    .pb-h { background: var(--high-bg); color: var(--high); }
    .pb-m { background: var(--med-bg);  color: var(--med); }
    .pb-l { background: var(--low-bg);  color: var(--low); }
    .task-dt { font-size: 0.7rem; color: var(--text-3); }
    .task-acts { display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity var(--ease); }
    .task-card:hover .task-acts { opacity: 1; }
    .ibtn { width: 30px; height: 30px; border: none; background: transparent; border-radius: 6px; cursor: pointer; color: var(--text-3); font-size: 13px; display: flex; align-items: center; justify-content: center; transition: all var(--ease); }
    .ibtn:hover { background: var(--surface-2); color: var(--text); }
    .ibtn.del:hover { background: var(--high-bg); color: var(--high); }

    /* EDIT */
    .edit-row { padding: 0 14px 13px 16px; display: flex; gap: 8px; align-items: center; }
    .edit-inp { flex: 1; height: 36px; padding: 0 12px; background: var(--surface-2); border: 1px solid var(--border-md); border-radius: 7px; color: var(--text); font-family: 'Geist', sans-serif; font-size: 0.88rem; outline: none; transition: border-color var(--ease); }
    .edit-inp:focus { border-color: var(--accent); }
    .esave, .ecancel { height: 36px; padding: 0 14px; border-radius: 7px; font-family: 'Geist', sans-serif; font-size: 0.8rem; font-weight: 500; cursor: pointer; border: 1px solid var(--border); transition: all var(--ease); }
    .esave { background: var(--accent); color: #1A1208; border-color: var(--accent); }
    .esave:hover { background: #F0DFC0; }
    .ecancel { background: transparent; color: var(--text-2); }
    .ecancel:hover { background: var(--surface-2); color: var(--text); }

    /* EMPTY */
    .empty { text-align: center; padding: 5rem 2rem; }
    .empty-art { font-size: 2.5rem; opacity: 0.2; margin-bottom: 1.25rem; }
    .empty-ttl { font-family: 'Instrument Serif', serif; font-size: 1.4rem; color: var(--text-2); margin-bottom: 0.4rem; }
    .empty-sub { font-size: 0.83rem; color: var(--text-3); }

    /* SKELETON */
    .skel { height: 56px; border-radius: var(--radius-md); background: var(--surface); border: 1px solid var(--border); position: relative; overflow: hidden; }
    .skel::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%); animation: sh 1.5s infinite; }
    @keyframes sh { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

    /* TOAST */
    .toasts { position: fixed; bottom: 1.5rem; right: 1.5rem; display: flex; flex-direction: column; gap: 8px; z-index: 999; pointer-events: none; }
    .toast { display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 1px solid var(--border-md); color: var(--text); padding: 10px 16px; border-radius: var(--radius-md); font-size: 0.84rem; font-weight: 500; opacity: 0; transform: translateX(16px); transition: all 0.3s cubic-bezier(0.4,0,0.2,1); min-width: 180px; }
    .toast.show { opacity: 1; transform: none; }
    .toast.ok  { border-color: rgba(92,184,92,0.4); }
    .toast.err { border-color: rgba(255,107,107,0.4); color: var(--high); }
    .t-ico { font-size: 13px; flex-shrink: 0; }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .app { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; flex-direction: row; flex-wrap: wrap; padding: 1rem; gap: 0.5rem; border-right: none; border-bottom: 1px solid var(--border); }
      .brand { flex: 0 0 100%; }
      .sidebar-section { flex-direction: row; flex-wrap: wrap; }
      .sidebar-label { display: none; }
      .fi { width: auto; padding: 0.4rem 0.75rem; }
      .sb-divider { display: none; }
      .api-pill { margin-top: 0; }
      .topbar, .add-wrap, .task-area { padding-left: 1rem; padding-right: 1rem; }
      .stats { padding: 1rem; gap: 8px; }
      .pri-lbl { display: none; }
      .task-acts { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">✓</div>
      <span class="brand-name">Taskflow</span>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Views</div>
      <button class="fi active" onclick="setFilter('all',this)">
        <span class="fi-left"><span class="fi-icon">◈</span>All tasks</span>
        <span class="fi-count" id="c-all">0</span>
      </button>
      <button class="fi" onclick="setFilter('pending',this)">
        <span class="fi-left"><span class="fi-icon">○</span>Pending</span>
        <span class="fi-count" id="c-pending">0</span>
      </button>
      <button class="fi" onclick="setFilter('done',this)">
        <span class="fi-left"><span class="fi-icon">●</span>Completed</span>
        <span class="fi-count" id="c-done">0</span>
      </button>
    </div>

    <div class="sb-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Priority</div>
      <button class="fi" onclick="setFilter('high',this)">
        <span class="fi-left"><span class="p-dot pd-h"></span>High</span>
        <span class="fi-count" id="c-high">0</span>
      </button>
      <button class="fi" onclick="setFilter('medium',this)">
        <span class="fi-left"><span class="p-dot pd-m"></span>Medium</span>
        <span class="fi-count" id="c-medium">0</span>
      </button>
      <button class="fi" onclick="setFilter('low',this)">
        <span class="fi-left"><span class="p-dot pd-l"></span>Low</span>
        <span class="fi-count" id="c-low">0</span>
      </button>
    </div>

    <div class="api-pill" style="margin-top:auto;">
      <div class="s-dot" id="sDot"></div>
      <span class="s-text" id="sText">Connecting…</span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <div>
        <h1 class="page-title" id="pgTitle">All tasks</h1>
        <p class="page-sub">Flask + SQLite backend</p>
      </div>
      <div class="ring-wrap" title="Completion rate">
        <svg class="ring-svg" width="44" height="44" viewBox="0 0 44 44">
          <circle class="ring-bg" cx="22" cy="22" r="18"/>
          <circle class="ring-fg" id="ringFg" cx="22" cy="22" r="18"
            stroke-dasharray="113.1" stroke-dashoffset="113.1"/>
        </svg>
        <div class="ring-pct" id="ringPct">0%</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="stTotal">0</div>
        <div class="stat-lbl">Total</div>
        <div class="stat-bar"><div class="stat-fill" style="width:100%;background:var(--border-hi);"></div></div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stPending">0</div>
        <div class="stat-lbl">Pending</div>
        <div class="stat-bar"><div class="stat-fill" id="bPending" style="width:0%;background:var(--med);"></div></div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stDone">0</div>
        <div class="stat-lbl">Done</div>
        <div class="stat-bar"><div class="stat-fill" id="bDone" style="width:0%;background:var(--accent);"></div></div>
      </div>
    </div>

    <div class="add-wrap">
      <div class="add-box">
        <div class="add-inner">
          <span class="add-plus">+</span>
          <input class="add-inp" id="taskInput" type="text"
            placeholder="Add a task and press Enter…" maxlength="250" autocomplete="off"/>
          <div class="add-sep"></div>
          <div class="pri-wrap">
            <span class="pri-lbl">Priority</span>
            <select class="pri-sel" id="priSel">
              <option value="medium">⚡ Medium</option>
              <option value="high">🔴 High</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
          <button class="btn-add" id="addBtn" onclick="addTask()">Add task</button>
        </div>
      </div>
    </div>

    <div class="task-area">
      <div class="ta-header">
        <span class="ta-label" id="taLabel">Tasks</span>
        <button class="btn-clr" onclick="clearDone()">Clear completed</button>
      </div>
      <div class="task-list" id="taskList">
        <div class="skel"></div>
        <div class="skel" style="height:50px;opacity:.6;margin-top:4px;"></div>
        <div class="skel" style="height:50px;opacity:.3;margin-top:4px;"></div>
      </div>
    </div>
  </main>
</div>

<div class="toasts" id="toasts"></div>

<script>
const API = "http://localhost:5000";
let tasks = [], filter = "all", editingId = null;

async function req(path, opts = {}) {
  const r = await fetch(API + path, { headers: {"Content-Type":"application/json"}, ...opts });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.error || "Error"); }
  return r.json();
}

async function loadTasks() {
  try { tasks = await req("/tasks"); setStatus(true); }
  catch { setStatus(false); toast("Cannot reach Flask — is it running?","err"); tasks = []; }
  render();
}

async function addTask() {
  const inp = document.getElementById("taskInput");
  const text = inp.value.trim(); if (!text) { inp.focus(); return; }
  const priority = document.getElementById("priSel").value;
  const btn = document.getElementById("addBtn"); btn.disabled = true;
  try {
    const t = await req("/tasks", {method:"POST", body:JSON.stringify({text,priority})});
    tasks.unshift(t); inp.value = ""; inp.focus();
    toast("Task added","ok"); render();
  } catch(e) { toast(e.message,"err"); }
  finally { btn.disabled = false; }
}

async function toggleDone(id) {
  const t = tasks.find(t=>t.id===id); if (!t) return;
  try {
    const u = await req(`/tasks/${id}`,{method:"PUT",body:JSON.stringify({done:!t.done})});
    Object.assign(t,u); render();
    toast(u.done ? "Marked complete ✓" : "Marked pending","ok");
  } catch(e) { toast(e.message,"err"); }
}

async function deleteTask(id) {
  try {
    await req(`/tasks/${id}`,{method:"DELETE"});
    tasks = tasks.filter(t=>t.id!==id);
    if (editingId===id) editingId=null;
    toast("Task deleted","err"); render();
  } catch(e) { toast(e.message,"err"); }
}

async function saveEdit(id) {
  const inp = document.getElementById("edit_"+id); if (!inp) return;
  const text = inp.value.trim(); if (!text) { inp.focus(); return; }
  try {
    const u = await req(`/tasks/${id}`,{method:"PUT",body:JSON.stringify({text})});
    Object.assign(tasks.find(t=>t.id===id),u);
    editingId=null; toast("Updated","ok"); render();
  } catch(e) { toast(e.message,"err"); }
}

async function clearDone() {
  const n = tasks.filter(t=>t.done).length;
  if (!n) { toast("No completed tasks"); return; }
  try {
    await req("/tasks/clear-done",{method:"DELETE"});
    tasks = tasks.filter(t=>!t.done);
    toast(`Cleared ${n} task${n>1?"s":""}` ,"ok"); render();
  } catch(e) { toast(e.message,"err"); }
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll(".fi").forEach(b=>b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  const titles = {all:"All tasks",pending:"Pending",done:"Completed",high:"High priority",medium:"Medium priority",low:"Low priority"};
  document.getElementById("pgTitle").textContent = titles[f] || "Tasks";
  render();
}

function getFiltered() {
  if (filter==="all")     return tasks;
  if (filter==="pending") return tasks.filter(t=>!t.done);
  if (filter==="done")    return tasks.filter(t=>t.done);
  return tasks.filter(t=>t.priority===filter);
}

function render() {
  const total=tasks.length, done=tasks.filter(t=>t.done).length, pending=total-done;
  const pct = total ? Math.round(done/total*100) : 0;
  const circ = 2*Math.PI*18;

  document.getElementById("stTotal").textContent   = total;
  document.getElementById("stPending").textContent = pending;
  document.getElementById("stDone").textContent    = done;
  document.getElementById("bPending").style.width  = total ? (pending/total*100)+"%" : "0%";
  document.getElementById("bDone").style.width     = total ? (done/total*100)+"%" : "0%";
  document.getElementById("ringFg").style.strokeDashoffset = circ-(pct/100)*circ;
  document.getElementById("ringPct").textContent   = pct+"%";
  document.getElementById("c-all").textContent     = total;
  document.getElementById("c-pending").textContent = pending;
  document.getElementById("c-done").textContent    = done;
  document.getElementById("c-high").textContent    = tasks.filter(t=>t.priority==="high").length;
  document.getElementById("c-medium").textContent  = tasks.filter(t=>t.priority==="medium").length;
  document.getElementById("c-low").textContent     = tasks.filter(t=>t.priority==="low").length;

  const filtered = getFiltered();
  document.getElementById("taLabel").textContent = `${filtered.length} task${filtered.length!==1?"s":""}`;
  const list = document.getElementById("taskList");

  if (!filtered.length) {
    const [art,ttl,sub] = tasks.length===0
      ? ["✦","No tasks yet","Add your first task above to get started"]
      : ["◎","Nothing here","No tasks match this filter"];
    list.innerHTML=`<div class="empty"><div class="empty-art">${art}</div><div class="empty-ttl">${ttl}</div><div class="empty-sub">${sub}</div></div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const isEd = editingId===t.id;
    const pb = {high:"pb-h",medium:"pb-m",low:"pb-l"}[t.priority]||"pb-m";
    const dt = new Date(t.created).toLocaleDateString("en-GB",{day:"numeric",month:"short"});
    const editSec = isEd?`<div class="edit-row">
      <input class="edit-inp" id="edit_${t.id}" value="${esc(t.text)}"
        onkeydown="if(event.key==='Enter')saveEdit(${t.id});if(event.key==='Escape'){editingId=null;render();}"/>
      <button class="esave" onclick="saveEdit(${t.id})">Save</button>
      <button class="ecancel" onclick="editingId=null;render()">Cancel</button>
    </div>`:"";
    return `<div class="task-card ${t.done?"is-done":""} p-${t.priority}">
      <div class="task-row">
        <div class="chk ${t.done?"on":""}" onclick="toggleDone(${t.id})"></div>
        <div class="task-body">
          <div class="task-txt ${t.done?"done":""}">${esc(t.text)}</div>
          <div class="task-meta">
            <span class="pbadge ${pb}">${t.priority}</span>
            <span class="task-dt">${dt}</span>
          </div>
        </div>
        <div class="task-acts">
          ${!isEd?`<button class="ibtn" title="Edit"
            onclick="editingId=${t.id};render();setTimeout(()=>{const i=document.getElementById('edit_${t.id}');if(i){i.focus();i.select();}},30)">✏</button>`:""}
          <button class="ibtn del" title="Delete" onclick="deleteTask(${t.id})">✕</button>
        </div>
      </div>
      ${editSec}
    </div>`;
  }).join("");
}

function setStatus(ok) {
  document.getElementById("sDot").className  = "s-dot "+(ok?"ok":"err");
  document.getElementById("sText").textContent = ok?"Flask API connected":"API offline";
}

function toast(msg, type="") {
  const c=document.getElementById("toasts");
  const el=document.createElement("div");
  el.className="toast"+(type?" "+type:"");
  const ico = type==="ok"?"✓":type==="err"?"✕":"·";
  el.innerHTML=`<span class="t-ico">${ico}</span>${esc(msg)}`;
  c.appendChild(el);
  requestAnimationFrame(()=>el.classList.add("show"));
  setTimeout(()=>{el.classList.remove("show");setTimeout(()=>el.remove(),350);},2800);
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

document.getElementById("taskInput").addEventListener("keydown",e=>{if(e.key==="Enter")addTask();});
loadTasks();
</script>
</body>
</html>
